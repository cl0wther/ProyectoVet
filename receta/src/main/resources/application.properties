server.port=8083
spring.application.name=vet-receta

# Conexión a la base de datos (Usando la misma configuración de tus otros MS)
spring.datasource.url=jdbc:mysql://localhost:3306/vet_recetas_db?useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Configuración de JPA/Hibernate
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true