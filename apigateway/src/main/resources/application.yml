spring:
  application:
    name: codigoms-gateway
  cloud:
    gateway:
      routes:

        # codigoms-usuarios → puerto 8081
        - id: receta-route
          uri: http://localhost:8090
          predicates:
            - Path=/api/recetas/**

        # codigoms-catalogo → puerto 8082
        - id: catalogo-route
          uri: http://localhost:8082
          predicates:
            - Path=/api/medicamento/**

        # codigoms-carrito → puerto 8083
        - id: mascotas-route
          uri: http://localhost:8084
          predicates:
            - Path=/api/mascota/**

        # codigoms-pedidos → puerto 8084
        - id: bodega-route
          uri: http://localhost:8091
          predicates:
            - Path=/api/inventario/**

        # codigoms-favoritos → puerto 8085
        - id: carrito-route
          uri: http://localhost:8088
          predicates:
            - Path=/api/carritos/**

        # codigoms-carrito → puerto 8083
        - id: citas-route
          uri: http://localhost:8085
          predicates:
            - Path=/api/cita/**

        # codigoms-pedidos → puerto 8084
        - id: duenio-route
          uri: http://localhost:8083
          predicates:
            - Path=/api/duenio/**

        # codigoms-favoritos → puerto 8085
        - id: pagos-route
          uri: http://localhost:8086
          predicates:
            - Path=/api/pagos/**
            
        # codigoms-favoritos → puerto 8085
        - id: pedidos-route
          uri: http://localhost:8087
          predicates:
            - Path=/api/pedidos/**
server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health, info, gateway
  endpoint:
    gateway:
      enabled: true

logging:
  level:
    org.springframework.cloud.gateway: INFO
