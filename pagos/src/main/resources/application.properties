server.port=8086

# Configuración de base de datos
spring.datasource.url=jdbc:mysql://localhost:3306/vet_pagos_db?useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Configuración de JPA/Hibernate
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# URL para el FeignClient que conecta con el microservicio de Pedidos
# Ajusta el puerto (8085) si en tu proyecto de Pedidos usas otro distinto
pedido.service.url=http://localhost:8085