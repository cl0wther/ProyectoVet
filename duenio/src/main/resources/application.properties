server.port=8083
spring.application.name=vet-duenio

# Configuración de base de datos MySQL (Asegúrate de que tus credenciales de root/password sean correctas)
spring.datasource.url=jdbc:mysql://localhost:3306/vet_duenio_db?useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Configuración de JPA/Hibernate (crea las tablas automáticamente)
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true