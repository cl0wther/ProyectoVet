server.port=8085
spring.application.name=vet-cita

# Configuración Base de Datos MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/vet_cita_db?useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

#puertos
duenio.service.url=http://localhost:8083
mascota.service.url=http://localhost:8084

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true